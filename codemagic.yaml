workflows:
  ios-trollstore:
    name: NovelAI Canvas iOS IPA (TrollStore)
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Analyze and test
        script: |
          flutter analyze
          flutter test

      - name: Build unsigned iOS app
        script: flutter build ios --release --no-codesign

      - name: Package TrollStore IPA
        script: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload NovelAICanvas.ipa
          rm -rf Payload
          shasum -a 256 NovelAICanvas.ipa > NovelAICanvas.ipa.sha256

    artifacts:
      - NovelAICanvas.ipa
      - NovelAICanvas.ipa.sha256
